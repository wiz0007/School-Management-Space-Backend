spring.application.name=school-management-api
server.port=${SERVER_PORT:8080}

server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}
app.security.rate-limit-capacity=${RATE_LIMIT_CAPACITY:120}
app.security.rate-limit-window=${RATE_LIMIT_WINDOW:1m}
app.security.jwt-secret=${JWT_SECRET:dev-only-change-this-secret-before-production-123456}
app.security.jwt-expiration=${JWT_EXPIRATION:8h}

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.url=jdbc:postgresql://localhost:5432/school_management
spring.datasource.username=postgres
spring.datasource.password=@Database7
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=0
